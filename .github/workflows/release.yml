name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm exec eslint .

      - name: Build
        run: pnpm build

      - name: Node dist smoke
        run: |
          node ./dist/cli.js --help
          node ./dist/cli.js doctor
          node ./dist/cli.js key list --db :memory: --json

      - name: Bun smoke
        run: bun scripts/bun-smoke.mjs

      - name: Verify Docker entrypoint invariant
        run: |
          entrypoints="$(awk '$1 == "ENTRYPOINT" { print }' Dockerfile)"
          entrypoint_count="$(printf '%s\n' "$entrypoints" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$entrypoint_count" != 1 ]; then
            printf 'Expected exactly one Dockerfile ENTRYPOINT, found %s\n' "$entrypoint_count" >&2
            printf '%s\n' "$entrypoints" >&2
            exit 1
          fi
          if [ "$entrypoints" != 'ENTRYPOINT ["node", "./dist/cli.js"]' ]; then
            printf 'Dockerfile ENTRYPOINT must stay: ENTRYPOINT ["node", "./dist/cli.js"]\n' >&2
            printf 'Found: %s\n' "$entrypoints" >&2
            exit 1
          fi

      - name: Pack release assets
        run: |
          rm -rf release-assets
          mkdir -p release-assets
          npm pack --pack-destination release-assets
          shopt -s nullglob
          tgz_files=(release-assets/hive-mp-publish-*.tgz)
          if [ "${#tgz_files[@]}" -ne 1 ]; then
            printf 'Expected exactly one hive-mp-publish tgz in release-assets, found %s\n' "${#tgz_files[@]}" >&2
            printf '%s\n' "${tgz_files[@]}" >&2
            exit 1
          fi

          tarball_listing="$(tar -tzf "${tgz_files[0]}")"
          printf '%s\n' "$tarball_listing"
          unexpected_paths="$(
            printf '%s\n' "$tarball_listing" | while IFS= read -r path; do
              case "$path" in
                (package/|package/dist/|package/dist/*|package/package.json|package/README.md|package/README.docker.md|package/LICENSE|package/NOTICE) ;;
                (*) printf '%s\n' "$path" ;;
              esac
            done
          )"
          if [ -n "$unexpected_paths" ]; then
            printf 'Unexpected files in npm tarball:\n%s\n' "$unexpected_paths" >&2
            exit 1
          fi

          tar -czf release-assets/hive-mp-publish-skills.tar.gz -C skills publish-to-wechat generate-wechat-theme apply-wechat-custom-theme
          tar -czf release-assets/publish-to-wechat.tar.gz -C skills/publish-to-wechat .
          tar -czf release-assets/generate-wechat-theme.tar.gz -C skills/generate-wechat-theme .
          tar -czf release-assets/apply-wechat-custom-theme.tar.gz -C skills/apply-wechat-custom-theme .
          ls -la release-assets

      - name: Bun global install smoke
        run: |
          shopt -s nullglob
          tgz_files=(release-assets/hive-mp-publish-*.tgz)
          if [ "${#tgz_files[@]}" -ne 1 ]; then
            printf 'Expected exactly one hive-mp-publish tgz in release-assets, found %s\n' "${#tgz_files[@]}" >&2
            printf '%s\n' "${tgz_files[@]}" >&2
            exit 1
          fi

          export BUN_INSTALL="$(mktemp -d)"
          export PATH="$BUN_INSTALL/bin:$PATH"
          bun add -g "${tgz_files[0]}"

          bin_path="$(command -v hive-mp-publish)"
          case "$bin_path" in
            "$BUN_INSTALL"/bin/*) ;;
            *)
              printf 'Installed bin resolved outside isolated BUN_INSTALL: %s\n' "$bin_path" >&2
              exit 1
              ;;
          esac

          bin_target="$(realpath "$bin_path")"
          first_line="$(head -n 1 "$bin_target")"
          if [ "$first_line" != '#!/usr/bin/env bun' ]; then
            printf 'Expected installed CLI shebang "#!/usr/bin/env bun", found: %s\n' "$first_line" >&2
            printf 'Inspected target: %s\n' "$bin_target" >&2
            exit 1
          fi

          hive-mp-publish doctor

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --title "$GITHUB_REF_NAME" --generate-notes
